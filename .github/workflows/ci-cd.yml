name: InvestIQ AI — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20.x'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ══════════════════════════════════════════════════
  # JOB 1: Code Quality & Testing
  # ══════════════════════════════════════════════════
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval db.adminCommand('ping')"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: backend
        run: npm ci

      - name: 🔍 Lint code
        working-directory: backend
        run: npm run lint --if-present

      - name: 🧪 Run unit tests
        working-directory: backend
        env:
          NODE_ENV: test
          MONGODB_URI_TEST: mongodb://localhost:27017/investiq_ai_test
          JWT_ACCESS_SECRET: test-access-secret-32chars-minimum
          JWT_REFRESH_SECRET: test-refresh-secret-32chars-minimum
        run: npm test -- --coverage --forceExit

      - name: 📊 Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: backend/coverage
          flags: backend

  test-frontend:
    name: 🎨 Frontend Build
    runs-on: ubuntu-latest
    
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: frontend
        run: npm ci

      - name: 🔍 TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: 🏗️ Build production bundle
        working-directory: frontend
        env:
          VITE_API_URL: https://api.investiq.ai/api/v1
        run: npm run build

      - name: 📁 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 7

  # ══════════════════════════════════════════════════
  # JOB 2: Security Scanning
  # ══════════════════════════════════════════════════
  security-scan:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Audit backend dependencies
        working-directory: backend
        run: npm audit --audit-level=high

      - name: 🔍 Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: 🔐 Scan for Secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

      - name: 🐳 Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'

  # ══════════════════════════════════════════════════
  # JOB 3: Docker Build & Push
  # ══════════════════════════════════════════════════
  build-docker:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, security-scan]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 📝 Extract metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=sha
            type=raw,value=latest

      - name: 🐳 Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🐳 Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ══════════════════════════════════════════════════
  # JOB 4: Deploy to Staging
  # ══════════════════════════════════════════════════
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/investiq-ai
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "✅ Staging deployment complete"

      - name: 🏥 Run smoke tests
        run: |
          sleep 15
          curl -f https://staging.investiq.ai/api/v1/health || exit 1
          echo "✅ Health check passed"

  # ══════════════════════════════════════════════════
  # JOB 5: Deploy to Production
  # ══════════════════════════════════════════════════
  deploy-production:
    name: 🌐 Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: 🌐 Deploy to Production
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/investiq-ai
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

      - name: ✅ Production health check
        run: |
          sleep 20
          curl -f https://api.investiq.ai/api/v1/health || exit 1

      - name: 📢 Notify Slack
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: good
          SLACK_MESSAGE: "✅ InvestIQ AI v${{ github.sha }} deployed to production!"
